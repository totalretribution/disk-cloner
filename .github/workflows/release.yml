name: release

# Build a binary tarball, .deb and .rpm whenever a vX.Y.Z tag is pushed,
# then attach them to a GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Stage artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          VER="${GITHUB_REF_NAME#v}"
          # Binary tarball
          tar -C target/release -czf "dist/disk-cloner-${VER}-x86_64-linux.tar.gz" disk-cloner
          cp -v target/release/disk-cloner "dist/disk-cloner-${VER}-x86_64-linux"
          # Packages
          cp -v target/debian/*.deb dist/
          cp -v target/generate-rpm/*.rpm dist/
          ( cd dist && sha256sum * > SHA256SUMS )
          ls -l dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/disk-cloner-*-x86_64-linux
            dist/SHA256SUMS
